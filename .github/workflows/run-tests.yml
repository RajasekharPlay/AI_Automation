name: REXON — Run Playwright Tests

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Supabase Test Run ID'
        required: true
        type: string

jobs:
  run-tests:
    name: Execute Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rexon/test-runner/package-lock.json

      - name: Install dependencies
        working-directory: rexon/test-runner
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('rexon/test-runner/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: rexon/test-runner
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cached browser)
        working-directory: rexon/test-runner
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run REXON Test Suite
        working-directory: rexon/test-runner
        env:
          RUN_ID: ${{ inputs.run_id }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CLOUDFLARE_R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          CLOUDFLARE_R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node runner.js

      - name: Upload trace artifacts to GitHub (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ inputs.run_id }}
          path: /tmp/traces/
          retention-days: 7
          if-no-files-found: ignore
